name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
      - name: Install backend dependencies
        run: npm install
        working-directory: backend
      - name: Run backend TypeScript check
        run: npm exec tsc -- -p tsconfig.json --noEmit
        working-directory: backend

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend
      - name: Build frontend site
        run: npm run build:site
        working-directory: frontend
